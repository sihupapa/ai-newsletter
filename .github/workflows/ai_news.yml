name: 🤖 AI 뉴스 브리핑 매일 아침 8시

on:
  schedule:
    # 매일 23:00 UTC = 한국시간 08:00 KST (UTC+9)
    - cron: "0 23 * * *"
  workflow_dispatch:  # 수동 테스트 버튼

jobs:
  send-ai-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 패키지 설치
        run: pip install -r requirements.txt

      - name: 📧 AI 뉴스 수집 & 발송
        env:
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PW:      ${{ secrets.GMAIL_APP_PW }}
          TO_EMAIL:          ${{ secrets.TO_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python send_ai_news.py
